name: Publish GitHub Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip libboost-all-dev jq nlohmann-json3-dev
      - name: Build (Release) and package
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build -j
          scripts/release_package.sh
      - name: List release artifacts
        run: |
          set -euo pipefail
          if [[ -d artifacts/release ]]; then
            echo "Artifacts:"
            ls -la artifacts/release
          else
            echo "No artifacts/release directory found"
          fi
      - name: Read RELEASE.md
        id: notes
        run: |
          set -euo pipefail
          if [[ -f RELEASE.md ]]; then
            body=$(cat RELEASE.md)
          else
            body="No release notes provided. Generated by release workflow."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Check release artifacts
        id: artifacts
        run: |
          set -euo pipefail
          if [[ -d artifacts/release ]] && find artifacts/release -type f -print -quit | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish release and upload artifacts
        if: steps.artifacts.outputs.has_files == 'true'
        uses: softprops/action-gh-release@6f1aa3a2d2ce9abfa3775106f1978a6d6d144ba2
        with:
          draft: false
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: false
          files: |
            artifacts/release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release without artifacts
        if: steps.artifacts.outputs.has_files != 'true'
        uses: softprops/action-gh-release@6f1aa3a2d2ce9abfa3775106f1978a6d6d144ba2
        with:
          draft: false
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
