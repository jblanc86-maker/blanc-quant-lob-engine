name: Publish GitHub Release

"on":
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Required for manual runs from a branch. Example: v2.0.1 (or 2.0.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
        run: |
          set -euo pipefail
          version=$(python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("CMakeLists.txt").read_text(encoding="utf-8")
          match = re.search(r"project\([^)]*VERSION\s+([0-9.]+)", text, re.IGNORECASE | re.DOTALL)
          if not match:
              raise SystemExit(
                  "Unable to determine project version from CMakeLists.txt; "
                  "verify project(... VERSION x.y.z) is present."
              )
          print(match.group(1))
          PY
          )
          tag_name=""
          publish_release=false
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]] && [[ -n "${GITHUB_REF_NAME:-}" ]]; then
            tag_name="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG_NAME}" ]]; then
            tag_name="${INPUT_TAG_NAME}"
          fi

          # We publish only v-prefixed tags.
          # - Tag pushes are already restricted to v* by workflow triggers.
          # - Manual dispatch should provide vX.Y.Z explicitly (avoid accidental releases).
          if [[ -n "${INPUT_TAG_NAME}" && "$tag_name" != v* ]]; then
            echo "ERROR: workflow_dispatch tag_name must start with 'v' (example: v2.0.1). Got: '$tag_name'" >&2
            exit 2
          fi
          if [[ -n "$tag_name" && "$tag_name" == v* ]]; then
            publish_release=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=Blanc LOB Engine $version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
      - name: Set up build deps
        if: steps.release_meta.outputs.publish_release == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build zip ca-certificates jq
      - name: Build (Release) and package
        if: steps.release_meta.outputs.publish_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build -j
          chmod +x scripts/release_package.sh
          ./scripts/release_package.sh

          # Fail fast: the workflow must produce a release archive.
          test -n "$(ls -1 artifacts/release/*.zip 2>/dev/null | head -n 1)"
      - name: List release artifacts
        if: steps.release_meta.outputs.publish_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d artifacts/release ]]; then
            echo "Artifacts:"
            ls -la artifacts/release
          else
            echo "No artifacts/release directory found"
          fi
      - name: Read RELEASE.md
        if: steps.release_meta.outputs.publish_release == 'true'
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f RELEASE.md ]]; then
            body=$(cat RELEASE.md)
          else
            body="No release notes provided. Generated by release workflow."
          fi
          # Persist body to a file so later steps (including REST API calls) have a stable source.
          printf "%s" "$body" > release_body.md
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Keep the release metadata in sync using GitHub's versioned REST API.
      # This is a belt-and-suspenders step in case release creation semantics change.
      - name: Ensure release exists via REST API (versioned)
        if: steps.release_meta.outputs.publish_release == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/update_github_release.py \
            --owner "${GITHUB_REPOSITORY_OWNER}" \
            --repo "${GITHUB_REPOSITORY#*/}" \
            --tag "${{ steps.release_meta.outputs.tag_name }}" \
            --name "${{ steps.release_meta.outputs.name }}" \
            --target-commitish "${{ github.ref_type == 'tag' && github.ref_name || github.sha }}" \
            --body-file release_body.md
      - name: Check release artifacts
        if: steps.release_meta.outputs.publish_release == 'true'
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          has_release_files=false
          if [[ -d artifacts/release ]] && [[ -n "$(find artifacts/release -type f -print -quit)" ]]; then
            has_release_files=true
          fi
          if [[ "$has_release_files" == "true" ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish release and upload artifacts
        if: steps.release_meta.outputs.publish_release == 'true' && steps.artifacts.outputs.has_files == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: false
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          # Ensure the release points at the tag's commit (or the current SHA for manual dispatch).
          target_commitish: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release without artifacts
        if: steps.release_meta.outputs.publish_release == 'true' && steps.artifacts.outputs.has_files == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: false
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release publish without tag
        if: steps.release_meta.outputs.publish_release != 'true'
        run: |
          echo "No tag ref or workflow_dispatch tag_name input was provided; skipping GitHub Release publication."
