name: "CodeQL Analysis"

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/codeql.yml'
  schedule:
    # Weekly on Tuesdays 03:24 UTC
    - cron: '24 3 * * 2'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual CodeQL run reason'
        required: false
        default: 'manual'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          languages: c-cpp
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          category: "/language:cpp"
    env:
      CODEQL_ACTION_DEBUG: true
      CODEQL_EXTRACTOR_CPP_TRAP_CACHING: false
