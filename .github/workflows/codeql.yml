name: "CodeQL Analysis"

permissions:
  security-events: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          languages: cpp
      - name: Autobuild
        uses: github/codeql-action/autobuild@68bde559dea0fdcac2102bfdf6230c5f70eb485e
      - name: Prepare CodeQL trap cache directory
        run: mkdir -p "$RUNNER_TEMP/trapCaches/cpp/tarballs"
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e
    env:
      CODEQL_ACTION_DEBUG: true
      CODEQL_EXTRACTOR_CPP_TRAP_CACHING: false
