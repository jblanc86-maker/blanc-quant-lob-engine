name: Docs Lint

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/docs-lint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/docs-lint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run markdownlint (repo config)
        uses: DavidAnson/markdownlint-cli2-action@eb5ca3ab411449c66620fe7f1b3c9e10547144b0

      - name: Run markdownlint (README strict MD013)
        uses: DavidAnson/markdownlint-cli2-action@eb5ca3ab411449c66620fe7f1b3c9e10547144b0
        with:
          config: .markdownlint.readme.yml
          globs: |
            README.md
            apps/README.md
            examples/README.md
