name: Docs Lint

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/docs-lint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/docs-lint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@eb5ca3ab411449c66620fe7f1b3c9e10547144b0 # v18
        with:
          config: readme.markdownlint.yml
          globs: |
            README.md
            apps/README.md
            examples/README.md
